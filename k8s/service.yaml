apiVersion: v1
kind: Service
metadata:
  name: automobile-app-svc
  namespace: automobile
  labels:
    app: automobile-app
spec:
  selector:
    app: automobile-app
  ports:
    - name: http
      port: 80
      targetPort: 5000
  type: ClusterIP
---
# Example only — in real use, create this via `kubectl create secret` or
# External Secrets Operator pulling from AWS Secrets Manager. Never commit
# real credentials to git.
apiVersion: v1
kind: Secret
metadata:
  name: automobile-db-secret
  namespace: automobile
type: Opaque
stringData:
  DB_HOST: "your-rds-endpoint.ap-south-1.rds.amazonaws.com"
  DB_PORT: "3306"
  DB_USER: "admin"
  DB_PASSWORD: "REPLACE_ME"
  DB_NAME: "automobile_db"
  SECRET_KEY: "REPLACE_WITH_RANDOM_STRING"
