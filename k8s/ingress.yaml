# No domain required. AWS Load Balancer Controller provisions a public ALB
# and gives it a DNS name like:
#   automobile-project-dev-alb-318579699.ap-south-1.elb.amazonaws.com
# You just open that DNS name in the browser - exactly like your screenshot.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automobile-app-ingress
  namespace: automobile
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    # Give the ALB itself a predictable name (shows up in the AWS console
    # and in the auto-generated DNS name, matching your screenshot format)
    alb.ingress.kubernetes.io/load-balancer-name: automobile-project-dev-alb
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: automobile-app-svc
                port:
                  number: 80
