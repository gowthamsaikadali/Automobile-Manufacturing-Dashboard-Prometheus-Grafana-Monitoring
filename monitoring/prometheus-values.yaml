# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace -f monitoring/prometheus-values.yaml

grafana:
  enabled: true
  adminPassword: "ChangeMeGrafanaAdmin!23"
  service:
    type: ClusterIP
  # Access via: kubectl port-forward -n monitoring svc/monitoring-grafana 3000:80
  defaultDashboardsEnabled: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: autoforge
          orgId: 1
          folder: AutoForge
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/autoforge
  dashboardsConfigMaps:
    autoforge: "autoforge-grafana-dashboards"

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    additionalScrapeConfigs: []
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "slack-notifications"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
    receivers:
      - name: "slack-notifications"
        slack_configs:
          - api_url: "REPLACE_WITH_SLACK_WEBHOOK_URL"
            channel: "#autoforge-alerts"
            send_resolved: true
            title: "{{ .CommonAnnotations.summary }}"
            text: "{{ .CommonAnnotations.description }}"

defaultRules:
  create: true
  rules:
    kubernetesResources: true
    node: true
    kubeApiserver: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
