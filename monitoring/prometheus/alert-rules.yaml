apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: automobile-app-alerts
  namespace: automobile
  labels:
    release: kube-prom-stack
spec:
  groups:
    - name: automobile-app.rules
      rules:
        - alert: PodCPUHigh
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="automobile"}[5m])) by (pod)
            / sum(kube_pod_container_resource_limits{namespace="automobile", resource="cpu"}) by (pod)
            > 0.8
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} CPU usage above 80%"
            description: "{{ $labels.pod }} has been above 80% of its CPU limit for 5 minutes."

        - alert: PodMemoryHigh
          expr: |
            sum(container_memory_working_set_bytes{namespace="automobile"}) by (pod)
            / sum(kube_pod_container_resource_limits{namespace="automobile", resource="memory"}) by (pod)
            > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} memory usage above 80%"
            description: "{{ $labels.pod }} has been above 80% of its memory limit for 5 minutes."

        - alert: HighRequestLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(flask_http_request_duration_seconds_bucket{namespace="automobile"}[5m])) by (le)
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P95 request latency above 1s"
            description: "95th percentile latency for the automobile app has exceeded 1 second for 5 minutes."

        - alert: HighErrorRate
          expr: |
            sum(rate(flask_http_request_total{namespace="automobile", status=~"5.."}[5m]))
            /
            sum(rate(flask_http_request_total{namespace="automobile"}[5m]))
            > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Error rate above 5%"
            description: "More than 5% of requests are returning 5xx over the last 5 minutes."

        - alert: PodDown
          expr: kube_deployment_status_replicas_available{namespace="automobile", deployment="automobile-app"} < 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "automobile-app has no available replicas"
            description: "All pods for automobile-app are down or not ready."

        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="automobile"}[15m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "{{ $labels.pod }} has restarted more than 3 times in 15 minutes."
