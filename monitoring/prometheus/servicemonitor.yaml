apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: automobile-app-monitor
  namespace: automobile
  labels:
    release: kube-prom-stack   # must match the Helm release name so Prometheus finds it
spec:
  selector:
    matchLabels:
      app: automobile-app
  namespaceSelector:
    matchNames:
      - automobile
  endpoints:
    - port: http           # must match the port name in service.yaml (add name: http there)
      path: /metrics
      interval: 15s
