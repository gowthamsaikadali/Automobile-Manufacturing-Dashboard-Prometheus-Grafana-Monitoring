apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: autoforge-app-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - autoforge
  selector:
    matchLabels:
      app: autoforge-app
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
# NOTE: the Service in helm/autoforge/templates/service.yaml needs a named
# port "http" for this selector to work - add `name: http` under the port
# entry if you enable this ServiceMonitor.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: autoforge-app-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: autoforge.rules
      rules:
        - alert: AutoForgeHighErrorRate
          expr: |
            sum(rate(flask_http_request_duration_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(flask_http_request_duration_seconds_count[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "AutoForge app error rate above 5%"
            description: "More than 5% of requests are failing with 5xx over the last 5 minutes."

        - alert: AutoForgeHighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le)) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "AutoForge p95 latency above 2s"
            description: "95th percentile request latency has exceeded 2 seconds for 5 minutes."

        - alert: AutoForgePodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="autoforge"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "AutoForge pod restarting repeatedly"
            description: "A pod in the autoforge namespace has restarted more than 3 times in 15 minutes."

        - alert: AutoForgeNoPodsReady
          expr: |
            kube_deployment_status_replicas_available{namespace="autoforge", deployment="autoforge-app"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "AutoForge has zero available replicas"
            description: "No autoforge-app pods are ready - the app is likely down."
