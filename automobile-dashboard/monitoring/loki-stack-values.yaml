# Install with:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm install loki grafana/loki-stack -n monitoring -f loki-stack-values.yaml
#
# This deploys Loki (log storage) + Promtail (log shipper as a DaemonSet on
# every node) and wires a Grafana datasource automatically if Grafana is
# already installed in the same "monitoring" namespace (kube-prometheus-stack).

loki:
  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 300m, memory: 512Mi }

promtail:
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 150m, memory: 128Mi }
  config:
    snippets:
      # Ship pod logs, tagged with namespace/pod/container labels so you can
      # filter to `{namespace="automobile"}` in Grafana's Explore view.
      pipelineStages:
        - cri: {}

grafana:
  enabled: false   # Grafana already deployed by kube-prometheus-stack; just add the datasource below

# After install, add Loki as a Grafana datasource (Grafana UI > Connections > Data sources > Add):
#   URL: http://loki.monitoring.svc.cluster.local:3100
# Or via a ConfigMap datasource provisioning file if you prefer GitOps.
