apiVersion: apps/v1
kind: Deployment
metadata:
  name: automobile-app
  namespace: automobile
  labels:
    app: automobile-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: automobile-app
  template:
    metadata:
      labels:
        app: automobile-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: automobile-app
          image: <YOUR_ECR_REPO_URI>:latest   # e.g. 123456789012.dkr.ecr.ap-south-1.amazonaws.com/automobile-app:latest
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: automobile-db-secret     # created from AWS Secrets Manager via External Secrets Operator, or manually
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Namespace
metadata:
  name: automobile
