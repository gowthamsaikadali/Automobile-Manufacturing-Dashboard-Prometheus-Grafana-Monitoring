<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Automobile Manufacturing Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="logo-circle">AM</div>
    <h1>Admin Login</h1>
    <p class="subtitle">Secure access to the automobile manufacturing dashboard</p>

    {% if error %}
      <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter admin username" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required>

      <div class="remember-row">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me</label>
      </div>

      <button type="submit" class="signin-btn">Sign In</button>
    </form>
  </div>
</body>
</html>
