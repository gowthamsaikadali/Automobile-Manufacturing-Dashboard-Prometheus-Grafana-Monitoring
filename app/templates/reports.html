{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block content %}
<div class="main-header">
    <div>
        <h1>Reports</h1>
        <p>Daily total production, last 30 days</p>
    </div>
</div>

<table>
    <thead><tr><th>Date</th><th>Total Produced</th></tr></thead>
    <tbody>
        {% for r in report %}
        <tr><td>{{ r.log_date }}</td><td>{{ r.total_qty }}</td></tr>
        {% else %}
        <tr><td colspan="2" style="text-align:center;color:#9ca3af;">No report data yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
